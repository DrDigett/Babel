app = "babel-plus-api"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  DB_PATH = "/data/babel.db"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  hard_limit = 25
  soft_limit = 10

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls"]
    port = 443

[[mounts]]
  source = "babel_data"
  destination = "/data"
