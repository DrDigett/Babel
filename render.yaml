services:
  - type: web
    name: babel-plus-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node packages/server/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: babel-plus-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        value: placeholder

databases:
  - name: babel-plus-db
    databaseName: babel
    plan: free
